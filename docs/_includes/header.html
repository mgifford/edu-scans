    <div class="site-header-actions">

        <span class="sr-only" data-theme-toggle-text>Switch to dark mode</span>
      </button>

      <nav class="site-nav" aria-label="Primary">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger" class="nav-toggle-label">
          <span class="menu-icon" aria-hidden="true">

                d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0

            </svg>
          </span>
          <span class="nav-toggle-text">Menu</span>

        <div class="trigger">
          <div class="nav-group nav-group--primary">
            <a class="page-link" href="{{ '/' | relative_url }}">Overview</a>
            <a class="page-link" href="{{ '/scan-progress.html' | relative_url }}">Progress</a>
            <a class="page-link" href="{{ '/domains.html' | relative_url }}">Domains</a>
          </div>

          <details class="nav-group nav-group--reports">
            <summary class="page-link nav-summary">Reports</summary>
            <div class="nav-submenu">
              <a class="page-link nav-sublink" href="{{ '/social-media.html' | relative_url }}">Social Media</a>
              <a class="page-link nav-sublink" href="{{ '/accessibility-statements.html' | relative_url }}">Accessibility</a>
              <a class="page-link nav-sublink" href="{{ '/technology-scanning.html' | relative_url }}">Technology</a>
              <a class="page-link nav-sublink" href="{{ '/third-party-tools.html' | relative_url }}">Third-Party JS</a>
              <a class="page-link nav-sublink" href="{{ '/lighthouse-scanning.html' | relative_url }}">Lighthouse</a>

          </details>
        </div>
      </nav>
    </div>

# Common subdomain patterns for .edu domains
#
# This file lists the most frequently seen subdomain prefixes used by United
# States higher-education institutions.  The subdomain scanner reads this file
# and probes each apex domain (e.g. "mit.edu") with every prefix to discover
# active sub-sites.  Entries that resolve successfully are added to the
# corresponding TOON domain record (avoiding duplicates).
#
# Categories follow the taxonomy in GitHub issue #XX:
#   - academic    : schools / colleges / departments within an institution
#   - administrative : offices and services visible to the public
#   - portals     : authenticated or internal applications
#   - research    : research centres and labs
#   - it          : information-technology infrastructure subdomains
#
# Add new prefixes to the most appropriate category.  Prefixes should be
# lowercase, hyphen-separated, and must not include a leading dot.

academic:

name: Scan Lighthouse

on:
  # Run every 4 hours to keep pace with other scan workflows.
  # With --concurrency 3 and --only-categories=performance,accessibility,
  # best-practices,seo each URL takes ~20-30 s, giving ~750-1,000 URLs per
  # 110-minute run.  The master seed has ~3,763 URLs; at 1,000/run the full
  # corpus is covered in ~4 runs (≈16 hours on first pass).
  # With --skip-recently-scanned-days 30 each URL is refreshed at most once
  # per month, so subsequent runs in the same day skip already-scanned URLs.
  schedule:
    - cron: '0 */4 * * *'

  # Allow manual trigger for a single seed code or all seed files.
  workflow_dispatch:
    inputs:
      country:
        description: 'Seed code to scan (legacy --country flag, e.g., TEXAS) — leave empty for all seed files'
        required: false
        type: string
      rate_limit:
        description: 'Maximum Lighthouse runs per second (default: 0.5)'
        required: false
        default: '0.5'
        type: string
      concurrency:
        description: 'Maximum parallel Lighthouse processes (default: 3)'
        required: false
        default: '3'
        type: string
      skip_recently_scanned_days:
        description: 'Skip URLs scanned within this many days (0 = re-scan all, 30 = monthly refresh)'
        required: false
        default: '30'
        type: string
      max_urls:
        description: 'Maximum URLs to scan per seed file per run (default: 1000). Lower values ensure the job completes within the 120-minute limit.'
        required: false
        default: '1000'
        type: string

# Lighthouse has its own concurrency group so frequent metadata-scan workflows
# (social media every 2 h, tech every 4 h) can never cancel a Lighthouse run.
concurrency:
  group: lighthouse-scan
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Lighthouse CLI
        run: |
          npm install -g lighthouse

      - name: Find latest metadata artifact run ID
        id: find-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api --paginate "/repos/${{ github.repository }}/actions/artifacts?per_page=100&name=validation-metadata" \
            --jq '.artifacts[] | select(.expired == false) | "\(.created_at) \(.workflow_run.id)"' \
            2>/dev/null | sort -rk1 | head -1 | awk '{print $2}' || echo "")
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          if [ -n "$RUN_ID" ]; then
            echo "Found validation-metadata artifact from run $RUN_ID"
          else
            echo "No validation-metadata artifact found — will start with fresh database"
          fi

      - name: Download previous metadata DB (if exists)
        if: steps.find-metadata.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validation-metadata
          path: data/
          run-id: ${{ steps.find-metadata.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Lighthouse scan (selected seed)
        if: ${{ github.event.inputs.country != '' }}
        run: |
          python3 -m src.cli.scan_lighthouse \
            --country "${{ github.event.inputs.country }}" \
            --rate-limit "${{ github.event.inputs.rate_limit || '0.5' }}" \
            --concurrency "${{ github.event.inputs.concurrency || '3' }}" \
            --skip-recently-scanned-days "${{ github.event.inputs.skip_recently_scanned_days || '30' }}" \
            --max-urls "${{ github.event.inputs.max_urls || '1000' }}" \
            --only-categories "performance,accessibility,best-practices,seo" \
            --throttling-method "provided" \
            2>&1 | tee lighthouse-scan-output.txt

      - name: Run Lighthouse scan (all seed files)
        if: ${{ github.event.inputs.country == '' || github.event_name == 'schedule' }}
        run: |
          python3 -m src.cli.scan_lighthouse \
            --all \
            --max-runtime 110 \
            --rate-limit "${{ github.event.inputs.rate_limit || '0.5' }}" \
            --concurrency "${{ github.event.inputs.concurrency || '3' }}" \
            --skip-recently-scanned-days "${{ github.event.inputs.skip_recently_scanned_days || '30' }}" \
            --max-urls "${{ github.event.inputs.max_urls || '1000' }}" \
            --only-categories "performance,accessibility,best-practices,seo" \
            --throttling-method "provided" \
            2>&1 | tee lighthouse-scan-output.txt

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-scan-${{ github.run_number }}
          path: |
            data/metadata.db
            lighthouse-scan-output.txt
            data/toon-seeds/**/*_lighthouse.toon
          retention-days: 90
          if-no-files-found: warn

      - name: Update shared validation metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-metadata
          path: |
            data/metadata.db
          retention-days: 90
          overwrite: true
          if-no-files-found: warn

      - name: Display scan summary
        if: always()
        run: |
          echo "## Lighthouse Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f lighthouse-scan-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 lighthouse-scan-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Rate Limit: ${{ github.event.inputs.rate_limit || '0.5' }} runs/sec" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrency: ${{ github.event.inputs.concurrency || '3' }} parallel processes" >> $GITHUB_STEP_SUMMARY
          echo "- Skip recently scanned: ${{ github.event.inputs.skip_recently_scanned_days || '30' }} days" >> $GITHUB_STEP_SUMMARY
          echo "- Max URLs per seed: ${{ github.event.inputs.max_urls || '1000' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow Run: [\#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

name: Scan Accessibility Statements

on:
  # Run every 4 hours — with --skip-recently-scanned-days 7 each run focuses
  # only on URLs not yet scanned in the past week, so the full URL corpus is
  # covered progressively without hammering government servers repeatedly.
  schedule:
    - cron: '30 */4 * * *'

  # Allow manual trigger for a single seed code or all seed files.
  workflow_dispatch:
    inputs:
      country:
        description: 'Seed code to scan (legacy --country flag, e.g., TEXAS) — leave empty for all seed files'
        required: false
        type: string
      rate_limit:
        description: 'Maximum requests per second (keep low for polite crawling)'
        required: false
        default: '1.0'
        type: string
      skip_recently_scanned_days:
        description: 'Skip URLs scanned within this many days (0 = re-scan all, 7 = weekly refresh)'
        required: false
        default: '7'
        type: string

# Share concurrency group with the other metadata-producing scan workflows so
# only one of them runs at a time, protecting the shared validation-metadata
# artifact without letting low-priority URL validation block richer scans.
concurrency:
  group: metadata-scans
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Find latest metadata artifact run ID
        id: find-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api --paginate "/repos/${{ github.repository }}/actions/artifacts?per_page=100&name=validation-metadata" \
            --jq '.artifacts[] | select(.expired == false) | "\(.created_at) \(.workflow_run.id)"' \
            2>/dev/null | sort -rk1 | head -1 | awk '{print $2}' || echo "")
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          if [ -n "$RUN_ID" ]; then
            echo "Found validation-metadata artifact from run $RUN_ID"
          else
            echo "No validation-metadata artifact found — will start with fresh database"
          fi

      - name: Download previous metadata DB (if exists)
        if: steps.find-metadata.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validation-metadata
          path: data/
          run-id: ${{ steps.find-metadata.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run accessibility scan (selected seed)
        if: ${{ github.event.inputs.country != '' }}
        run: |
          SKIP_DAYS="${{ github.event.inputs.skip_recently_scanned_days || '7' }}"
          python3 -m src.cli.scan_accessibility \
            --country "${{ github.event.inputs.country }}" \
            --rate-limit "${{ github.event.inputs.rate_limit }}" \
            --skip-recently-scanned-days "$SKIP_DAYS" \
            2>&1 | tee accessibility-scan-output.txt

      - name: Run accessibility scan (all seed files)
        if: ${{ github.event.inputs.country == '' || github.event_name == 'schedule' }}
        run: |
          SKIP_DAYS="${{ github.event.inputs.skip_recently_scanned_days || '7' }}"
          python3 -m src.cli.scan_accessibility \
            --all \
            --max-runtime 110 \
            --rate-limit "${{ github.event.inputs.rate_limit || '1.0' }}" \
            --skip-recently-scanned-days "$SKIP_DAYS" \
            2>&1 | tee accessibility-scan-output.txt

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-scan-${{ github.run_number }}
          path: |
            data/metadata.db
            accessibility-scan-output.txt
            data/toon-seeds/**/*_accessibility.toon
          retention-days: 90
          if-no-files-found: warn

      - name: Update shared validation metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-metadata
          path: |
            data/metadata.db
          retention-days: 90
          overwrite: true
          if-no-files-found: warn

      - name: Display scan summary
        if: always()
        run: |
          echo "## Accessibility Statement Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f accessibility-scan-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 accessibility-scan-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Rate Limit: ${{ github.event.inputs.rate_limit || '1.0' }} req/sec" >> $GITHUB_STEP_SUMMARY
          echo "- Skip Recently Scanned: ${{ github.event.inputs.skip_recently_scanned_days || '7' }} days" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow Run: [\#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

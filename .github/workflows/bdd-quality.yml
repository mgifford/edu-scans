name: BDD Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bdd-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Enforce BDD traceability policy
        run: python3 scripts/check_bdd_traceability.py

      - name: Run BDD docs-contract scenarios
        run: npm run test:bdd:docs-contract

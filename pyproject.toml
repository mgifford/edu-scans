[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
]
ignore = [
    "E501",  # line-too-long – handled by formatter
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
